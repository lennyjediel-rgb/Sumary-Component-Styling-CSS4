<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Summary</title>
    <link rel="stylesheet" href="style.css">
    <link href="HankenGrotesk-Bold.ttf">
    <!--HEAD SECTION-->
</head>

<body>

    <div id="card">
        <!--LEFT SECTION-->
        <div class="Left">
            <p class="intro">Your Result</p>
            <div class="circle">
                <h1>76</h1>
                <p class="result"> of 100</p>
            </div>
            <h2>Great</h2>
            <p class="info">You have scored higher than 65% of the people who have taken these tests. </p>
        </div>
        <!--RIGHT SECTION-->
        <div class="Right">
            <h3>Summary</h3>
            <div class="item reaction">Reaction <span>80/100</span></div>
            <div class="item memory">Memory<span>92/100</span></div>
            <div class=" item verbal">Verbal<span>61/100</span></div>
            <div class="item visual">Visual<span>73/100</span></div>
            <button>Continue</button>
        </div>




    </div>


</body>

</html>
